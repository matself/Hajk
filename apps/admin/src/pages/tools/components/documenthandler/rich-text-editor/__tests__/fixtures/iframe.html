<p>Below is an embedded iframe:</p>
<figure><span data-type="iframe" data-iframe-src="https://example.com/embed" data-iframe-title="Example Embed" data-iframe-width="600" data-iframe-height="373" data-image-position="left">Example Embed</span></figure>
<p>An iframe with no title uses the placeholder:</p>
<figure><span data-type="iframe" data-iframe-src="https://example.com/other" data-iframe-title="" data-iframe-width="800" data-iframe-height="500" data-image-position="center">&lt;iframetitlehere&gt;</span></figure>
